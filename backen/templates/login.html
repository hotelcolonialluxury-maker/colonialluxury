<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login Admin - Hotel Colonial Luxury</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}"><style>
    body {
        font-family: 'Poppins', sans-serif;
        background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        color: #fff;
    }

    .card {
        background: rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 15px;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        width: 400px;
        color: #fff;
        transition: all 0.3s ease;
    }

    .card:hover {
        transform: translateY(-5px);
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
    }

    .card h3 {
        text-align: center;
        margin-bottom: 25px;
        font-weight: 600;
        letter-spacing: 1px;
        color: #f5d97e;
    }

    .form-label {
        color: #ddd;
        font-weight: 500;
    }

    .form-control {
        background: rgba(255, 255, 255, 0.15);
        border: none;
        color: #fff;
        border-radius: 8px;
        padding: 10px 12px;
    }

    .form-control::placeholder {
        color: #ccc;
    }

    .form-control:focus {
        background: rgba(255, 255, 255, 0.25);
        box-shadow: 0 0 0 2px #f5d97e;
    }

    .btn-primary {
        background: #f5d97e;
        border: none;
        color: #1c1c1c;
        font-weight: 600;
        transition: all 0.3s ease;
        border-radius: 8px;
        padding: 10px;
    }

    .btn-primary:hover {
        background: #f4ca4c;
        transform: scale(1.03);
    }

    #alerta {
        text-align: center;
        border-radius: 8px;
    }

    .brand-name {
        font-size: 1.2rem;
        color: #f5d97e;
        text-align: center;
        margin-bottom: 10px;
        font-weight: 500;
        letter-spacing: 0.5px;
    }

    footer {
        position: absolute;
        bottom: 10px;
        color: #ccc;
        font-size: 0.85rem;
        text-align: center;
        width: 100%;
    }
</style>
</head>
<body class="bg-light">

<div class="container d-flex justify-content-center align-items-center" style="height:100vh;">
    <div class="card p-4 shadow-sm" style="width: 400px;">
        <h3 class="text-center mb-3">Iniciar Sesión</h3>
        <div id="alerta" class="alert alert-danger d-none"></div>
        <form id="loginForm">
            <div class="mb-3">
                <label for="email" class="form-label">Correo</label>
                <input type="email" class="form-control" id="email" required>
            </div>
            <div class="mb-3">
                <label for="password" class="form-label">Contraseña</label>
                <input type="password" class="form-control" id="password" required>
            </div>
            <button type="submit" class="btn btn-primary w-100">Entrar</button>
        </form>
    </div>
</div>

<!-- 🔥 ORDEN CORRECTO DE SCRIPTS -->
<script src="{{ url_for('static', filename='js/config.js') }}"></script>
<script src="{{ url_for('static', filename='js/login.js') }}"></script>

</body>
</html>
